name: MCP hub Build and Push
on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      mcp:
        description: "MCP to import"
      all:
        description: "Import all MCPs"
        type: choice
        required: false
        default: "false"
        options:
          - "false"
          - "true"

env:
  REGISTRY: ghcr.io
  TAG: ${{ github.sha }}
  BL_ENV: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
  DEV_IMAGE_BUCKET: controlplane-dev-build-images-eu-west-1-37df18
  PROD_IMAGE_BUCKET: controlplane-prod-build-images-us-west-2-466b17

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      servers: ${{ steps.retrieve-servers.outputs.servers }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 2  # Fetch last 2 commits to compare changes
      - name: Retrieve hub servers
        id: retrieve-servers
        shell: bash
        run: |
          set -euo pipefail
          cd hub
          if [[ ! -z "${{ inputs.mcp }}" ]]; then
            echo "servers=[\"${{ inputs.mcp }}\"]" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get list of all server YAML files
          all_servers=$(tree -J -L 1 | jq -c '.[0].contents | map(.name | rtrimstr(".yaml"))')

          # Filter servers based on changes
          changed_servers=()

          if [[ "${{ inputs.all }}" == "true" ]]; then
            echo "Importing all servers (excluding disabled/coming soon)"
            for server in $(echo $all_servers | jq -r '.[]'); do
              # Check if the server is disabled or coming soon
              if [ -f "${server}.yaml" ]; then
                disabled=$(grep -E "^disabled: true" "${server}.yaml" || true)
                coming_soon=$(grep -E "^comingSoon: true" "${server}.yaml" || true)
                if [ -z "$disabled" ] && [ -z "$coming_soon" ]; then
                  changed_servers+=("$server")
                else
                  echo "Skipping $server (disabled or coming soon)"
                fi
              fi
            done
          else
            # Check if there are changes in internal or cmd or super-gateway folders
            if git diff --name-only HEAD^ HEAD | grep -q "internal/" || \
               git diff --name-only HEAD^ HEAD | grep -q "cmd/" || \
               git diff --name-only HEAD^ HEAD | grep -q "super-gateway/" || \
               git diff --name-only HEAD^ HEAD | grep -q "dockerfiles/"; then
              # If there are changes in internal or cmd or super-gateway, include all servers (excluding disabled/coming soon)
              echo "Changes detected in internal or cmd or super-gateway folders, including all servers (excluding disabled/coming soon)"
              for server in $(echo $all_servers | jq -r '.[]'); do
                # Check if the server is disabled or coming soon
                if [ -f "${server}.yaml" ]; then
                  disabled=$(grep -E "^disabled: true" "${server}.yaml" || true)
                  coming_soon=$(grep -E "^comingSoon: true" "${server}.yaml" || true)
                  if [ -z "$disabled" ] && [ -z "$coming_soon" ]; then
                    changed_servers+=("$server")
                  else
                    echo "Skipping $server (disabled or coming soon)"
                  fi
                fi
              done
            else
              # Otherwise, only include servers with specific changes (excluding disabled/coming soon)
              for server in $(echo $all_servers | jq -r '.[]'); do
                if git diff --name-only HEAD^ HEAD | grep -q "hub/${server}.yaml" || \
                   git diff --name-only HEAD^ HEAD | grep -q "hub/${server}/" || \
                   git diff --name-only HEAD^ HEAD | grep -q "dockerfiles/${server}.Dockerfile"; then
                  # Check if the server is disabled or coming soon
                  if [ -f "${server}.yaml" ]; then
                    disabled=$(grep -E "^disabled: true" "${server}.yaml" || true)
                    coming_soon=$(grep -E "^comingSoon: true" "${server}.yaml" || true)
                    if [ -z "$disabled" ] && [ -z "$coming_soon" ]; then
                      changed_servers+=("$server")
                    else
                      echo "Skipping $server (disabled or coming soon)"
                    fi
                  fi
                fi
              done
            fi
          fi

          # Convert array to JSON array
          if [ ${#changed_servers[@]} -eq 0 ]; then
            echo "No servers with changes found"
            echo "servers=[]" >> $GITHUB_OUTPUT
          else
            # Create a properly formatted JSON array
            servers_json="["
            for server in "${changed_servers[@]}"; do
              if [ "$servers_json" != "[" ]; then
                servers_json="$servers_json,"
              fi
              servers_json="$servers_json\"$server\""
            done
            servers_json="$servers_json]"
            echo "servers=$servers_json" >> $GITHUB_OUTPUT
          fi
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: |-
      ${{
        github.ref_name == 'main' && 'prod'
      || github.ref_name == 'develop' && 'dev'
      || 'dev'
      }}
    env:
      BL_API_URL: ${{ vars.BL_API_URL }}
      BL_ADMIN_USERNAME: ${{ secrets.BL_ADMIN_USERNAME }}
      BL_ADMIN_PASSWORD: ${{ secrets.BL_ADMIN_PASSWORD }}
    needs:
      - generate-matrix
    if: needs.generate-matrix.outputs.servers != '[]'
    # Do not cancel the other servers when one fails: each server is independent.
    strategy:
      fail-fast: false
      matrix:
        server: ${{ fromJson(needs.generate-matrix.outputs.servers )}}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Echo server
        run: |
          set -euo pipefail
          echo "Server: ${{ matrix.server }}"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Go 1.21.x
        uses: actions/setup-go@v6
        with:
          # Semantic version range syntax or exact version of Go
          go-version: "1.23.3"
      - name: Install dependencies
        run: go get .
      - name: Build super gateway
        run: |
          set -euo pipefail
          make build-super-gateway
      - name: Build and push
        run: |
          set -euo pipefail
          go run main.go import \
            -p \
            -d \
            -r ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.BL_ENV }} \
            -m ${{ matrix.server }} \
            -t ${{ env.TAG }}
      # Only reached when every previous step succeeded. The marker artifact lets
      # the downstream jobs run for the servers that published successfully.
      - name: Mark publish success
        run: |
          set -euo pipefail
          mkdir -p publish-success
          echo "ok" > "publish-success/${{ matrix.server }}"
      - name: Upload publish success marker
        uses: actions/upload-artifact@v7
        with:
          name: publish-success-${{ matrix.server }}
          path: publish-success/${{ matrix.server }}
          retention-days: 1
  collect-publish-success:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - generate-matrix
      - publish
    # Always run so the output is valid JSON ('[]' when nothing published),
    # otherwise the downstream matrix would receive an empty string.
    if: always()
    outputs:
      servers: ${{ steps.collect.outputs.servers }}
    steps:
      - name: Download publish success markers
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: publish-success-*
          path: markers
          merge-multiple: true
      - name: Collect successful servers
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          servers=()
          if [ -d markers ]; then
            for f in markers/*; do
              [ -e "$f" ] || continue
              servers+=("$(basename "$f")")
            done
          fi
          if [ ${#servers[@]} -eq 0 ]; then
            echo "No servers published successfully"
            echo "servers=[]" >> $GITHUB_OUTPUT
          else
            servers_json="["
            for server in "${servers[@]}"; do
              if [ "$servers_json" != "[" ]; then
                servers_json="$servers_json,"
              fi
              servers_json="$servers_json\"$server\""
            done
            servers_json="$servers_json]"
            echo "Servers that published successfully: $servers_json"
            echo "servers=$servers_json" >> $GITHUB_OUTPUT
          fi
  mk3-build:
    runs-on: codebuild-mcp-hub-${{ github.run_id }}-${{ github.run_attempt }}
    # Batch jobs can sit in RUNNABLE for a while (16 vCPU Fargate tasks, limited
    # concurrency), so allow more than the AWS-side poll budget in mk3-build.sh.
    timeout-minutes: 45
    environment: |-
      ${{
        github.ref_name == 'main' && 'prod'
      || github.ref_name == 'develop' && 'dev'
      || 'dev'
      }}
    env:
      BL_API_URL: ${{ vars.BL_API_URL }}
      BL_ADMIN_USERNAME: ${{ secrets.BL_ADMIN_USERNAME }}
      BL_ADMIN_PASSWORD: ${{ secrets.BL_ADMIN_PASSWORD }}
    needs: [collect-publish-success]
    if: always() && needs.collect-publish-success.outputs.servers != '[]'
    strategy:
      fail-fast: false
      matrix:
        server: ${{ fromJson(needs.collect-publish-success.outputs.servers )}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Build mk3 image
        env:
          MCP_NAME: ${{ matrix.server }}
          IMAGE_TAG: ${{ env.TAG }}
          BL_TYPE: function
          BL_ENV: ${{ env.BL_ENV }}
          SRC_REGISTRY: ${{ env.REGISTRY }}/${{ github.repository }}
          BUILD_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          LOG_LEVEL: debug
          IMAGE_BUCKET_MK3: ${{ env.BL_ENV == 'prod' && env.PROD_IMAGE_BUCKET || env.DEV_IMAGE_BUCKET }}
          DEPOT_PROJECT_ID: ${{ env.BL_ENV == 'prod' && secrets.DEPOT_PROJECT_ID_PROD || secrets.DEPOT_PROJECT_ID_DEV }}
          BATCH_JOB_QUEUE: ${{ env.BL_ENV == 'prod' && (vars.BATCH_JOB_QUEUE_PROD || 'controlplane-prod-build') || (vars.BATCH_JOB_QUEUE_DEV || 'controlplane-dev-build') }}
          BATCH_JOB_DEFINITION: ${{ env.BL_ENV == 'prod' && (vars.BATCH_JOB_DEFINITION_PROD || 'controlplane-prod-build') || (vars.BATCH_JOB_DEFINITION_DEV || 'controlplane-dev-build') }}
          BATCH_REGION: ${{ env.BL_ENV == 'prod' && (vars.BATCH_REGION_PROD || 'us-west-2') || (vars.BATCH_REGION_DEV || 'eu-west-1') }}
          DEPOT_TOKEN: ${{ env.BL_ENV == 'prod' && secrets.DEPOT_TOKEN_PROD || secrets.DEPOT_TOKEN_DEV }}
        run: |
          set -euo pipefail
          chmod +x ./scripts/mk3-build.sh
          ./scripts/mk3-build.sh
      # Only reached when the mk3 build succeeded for this server.
      - name: Mark mk3 success
        run: |
          set -euo pipefail
          mkdir -p mk3-success
          echo "ok" > "mk3-success/${{ matrix.server }}"
      - name: Upload mk3 success marker
        uses: actions/upload-artifact@v7
        with:
          name: mk3-success-${{ matrix.server }}
          path: mk3-success/${{ matrix.server }}
          retention-days: 1
  collect-mk3-success:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - collect-publish-success
      - mk3-build
    # Always run so the output is valid JSON ('[]' when nothing built),
    # otherwise the downstream matrix would receive an empty string.
    if: always()
    outputs:
      servers: ${{ steps.collect.outputs.servers }}
    steps:
      - name: Download mk3 success markers
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: mk3-success-*
          path: markers
          merge-multiple: true
      - name: Collect successful servers
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          servers=()
          if [ -d markers ]; then
            for f in markers/*; do
              [ -e "$f" ] || continue
              servers+=("$(basename "$f")")
            done
          fi
          if [ ${#servers[@]} -eq 0 ]; then
            echo "No servers built mk3 successfully"
            echo "servers=[]" >> $GITHUB_OUTPUT
          else
            servers_json="["
            for server in "${servers[@]}"; do
              if [ "$servers_json" != "[" ]; then
                servers_json="$servers_json,"
              fi
              servers_json="$servers_json\"$server\""
            done
            servers_json="$servers_json]"
            echo "Servers that built mk3 successfully: $servers_json"
            echo "servers=$servers_json" >> $GITHUB_OUTPUT
          fi
  update-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: |-
      ${{
        github.ref_name == 'main' && 'prod'
      || github.ref_name == 'develop' && 'dev'
      || 'dev'
      }}
    env:
      BL_API_URL: ${{ vars.BL_API_URL }}
      BL_ADMIN_USERNAME: ${{ secrets.BL_ADMIN_USERNAME }}
      BL_ADMIN_PASSWORD: ${{ secrets.BL_ADMIN_PASSWORD }}
    needs: [collect-mk3-success]
    if: always() && needs.collect-mk3-success.outputs.servers != '[]'
    strategy:
      fail-fast: false
      matrix:
        server: ${{ fromJson(needs.collect-mk3-success.outputs.servers )}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Go 1.21.x
        uses: actions/setup-go@v6
        with:
          go-version: "1.23.3"
      - name: Install dependencies
        run: go get .
      - name: Push catalog to admin API
        run: |
          set -euo pipefail
          go run main.go import \
            -s \
            -r ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.BL_ENV }} \
            -m ${{ matrix.server }} \
            -t ${{ env.TAG }}
